name: Deploy to genbasesoftware.com

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    # ── React Build ─────────────────────────────────────────
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '20'

    - name: Install React dependencies
      working-directory: ./DigitalEvaluationReact
      run: npm install

    - name: Build React app
      working-directory: ./DigitalEvaluationReact
      run: npm run build

    # Copy React dist → .NET wwwroot
    - name: Copy React build into wwwroot
      run: |
        mkdir -p ./DIGITALEVALUATIONAPT/DIGITALEVALUATION/wwwroot
        cp -r ./DigitalEvaluationReact/dist/. ./DIGITALEVALUATIONAPT/DIGITALEVALUATION/wwwroot/

    # ── .NET Build ──────────────────────────────────────────
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: '8.0.x'

    - name: Restore
      run: dotnet restore ./DIGITALEVALUATIONAPT/DIGITALEVALUATION/DIGITALEVALUATION.csproj

    - name: Publish
      run: dotnet publish ./DIGITALEVALUATIONAPT/DIGITALEVALUATION/DIGITALEVALUATION.csproj -c Release -o ./publish

    # ── Clean up publish folder ──────────────────────────────
    - name: Remove runtimes folder completely
      run: rm -rf ./publish/runtimes

    - name: Show publish folder size
      run: du -sh ./publish/

    # ── Deploy ──────────────────────────────────────────────
    - name: Deploy via FTPS
      uses: SamKirkland/FTP-Deploy-Action@v4.3.4
      with:
        server: ${{ secrets.FTP_SERVER }}
        username: ${{ secrets.FTP_USERNAME }}
        password: ${{ secrets.FTP_PASSWORD }}
        protocol: ftp
        port: 21
        local-dir: ./publish/
        server-dir: /httpdocs/httpdocs/
        timeout: 120000
        retry-count: 10
        exclude: |
          **/.git*
          **/.git*/**
          **/runtimes/**
